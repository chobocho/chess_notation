{{define "board"}}
<table class="chessboard" data-fen="{{.FEN}}">
<tbody>
{{range .Rows}}
<tr>
  {{range .Cells}}
  <td class="sq {{.Shade}}" data-sq="{{.Name}}">
    {{- if .Piece -}}
    <img class="piece" src="/static/pieces/{{.Piece}}.svg" alt="{{.Piece}}" draggable="false">
    {{- end -}}
  </td>
  {{end}}
</tr>
{{end}}
</tbody>
</table>
{{end}}
